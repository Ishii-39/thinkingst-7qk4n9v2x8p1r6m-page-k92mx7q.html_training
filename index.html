// ╔══════════════════════════════════════════════╗
// ║  ユーティリティ関数                             ║
// ╚══════════════════════════════════════════════╝

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickRandom(arr, n) {
  const shuffled = shuffle(arr);
  return shuffled.slice(0, Math.min(n, shuffled.length));
}

function randomItem(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

// ║  メインアプリ                                  ║
// ╚══════════════════════════════════════════════╝

function App() {
  const [screen, setScreen] = useState("menu");
  const [key, setKey] = useState(0);

  const goTo = useCallback((s) => {
    setKey(k => k + 1);
    setScreen(s);
  }, []);

  const backBtn = (
    <button onClick={() => goTo("menu")} style={styles.backBtn}>
      ← メニューに戻る
    </button>
  );

  return (
    <div style={styles.app}>
      {screen === "menu" && <MenuScreen goTo={goTo} />}
      {screen === "hiragana" && <HiraganaScreen key={key} back={backBtn} />}
      {screen === "numbers" && <NumbersScreen key={key} back={backBtn} />}
      {screen === "kanji" && <KanjiScreen key={key} back={backBtn} />}
      {screen === "ojii" && <OjiiScreen key={key} back={backBtn} />}
      {screen === "image_memory" && <ImageMemoryScreen key={key} back={backBtn} />}
      {screen === "logic" && <LogicScreen key={key} back={backBtn} />}
      {screen === "logic_lv2" && <LogicLv2Screen key={key} back={backBtn} />}
      {screen === "direction" && <DirectionScreen key={key} back={backBtn} />}
    </div>
  );
}

function MenuScreen({ goTo }) {
  const items = [
    { id: "hiragana", label: "①ランダム\nひらがな" },
    { id: "numbers", label: "②ランダム\n数値" },
    { id: "kanji", label: "③漢数字" },
    { id: "ojii", label: "④おじい\n/おばあ" },
    { id: "image_memory", label: "⑤イメージ\n記憶" },
    { id: "logic", label: "⑥論理" },
    { id: "logic_lv2", label: "⑦論理\nLv.2" },
    { id: "direction", label: "⑧方角" },
  ];
  return (
    <div style={styles.menuContainer}>
      <h1 style={styles.menuTitle}>思考トレーニング</h1>
      <div style={styles.menuGrid}>
        {items.map(item => (
          <button key={item.id} style={styles.menuBtn} onClick={() => goTo(item.id)}
            onMouseEnter={e => e.target.style.background = "#E0E0E0"}
            onMouseLeave={e => e.target.style.background = "#F5F5F5"}>
            {item.label.split("\n").map((line, i) => <span key={i}>{line}<br/></span>)}
          </button>
        ))}
      </div>
    </div>
  );
}

// ║  ① ランダムひらがな（動的生成）                   ║
// ╚══════════════════════════════════════════════╝

const HIRAGANA_BASE = [
  "あ","い","う","え","お",
  "か","き","く","け","こ",
  "さ","し","す","せ","そ",
  "た","ち","つ","て","と",
  "な","に","ぬ","ね","の",
  "は","ひ","ふ","へ","ほ",
  "ま","み","む","め","も",
  "や","ゆ","よ",
  "ら","り","る","れ","ろ",
  "わ","を",
];

function HiraganaScreen({ back }) {
  const grid = useMemo(() => {
    const chars = [...HIRAGANA_BASE, "ん", "ん", "ん", "ん"];
    return shuffle(chars);
  }, []);

  return (
    <div style={styles.page}>
      {back}
      <div style={{
        display: "flex", alignItems: "center", justifyContent: "center",
        height: "calc(100vh - 48px)", padding: "0 16px 16px",
      }}>
        <div style={{
          display: "grid",
          gridTemplateColumns: "repeat(7, 1fr)",
          gap: 0,
          width: "min(85vh, 80vw)",
        }}>
          {grid.map((char, i) => (
            <div key={i} style={{
              display: "flex",
              alignItems: "center",
              justifyContent: "center",
              fontSize: "min(9vh, 9vw)",
              fontFamily: "'Hiragino Sans', 'Yu Gothic', sans-serif",
              color: "#222",
              aspectRatio: "1",
            }}>
              {char}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ╔══════════════════════════════════════════════╗
// ║  ② ランダム数値（動的生成）                      ║
// ╚══════════════════════════════════════════════╝

function NumbersScreen({ back }) {
  const grid = useMemo(() => {
    const nums = Array.from({ length: 99 }, (_, i) => i + 1);
    return shuffle(nums);
  }, []);

  // 9列×11行に配置、行ごとに左右交互にずらす
  const cols = 9;
  const rows = 11;

  return (
    <div style={styles.page}>
      {back}
      <div style={{
        display: "flex", alignItems: "center", justifyContent: "center",
        height: "calc(100vh - 48px)", padding: "0 60px 16px",
      }}>
        <div style={{
          display: "grid",
          gridTemplateColumns: `repeat(${cols}, 1fr)`,
          gridTemplateRows: `repeat(${rows}, 1fr)`,
          width: "90vw",
          height: "calc(100vh - 80px)",
        }}>
          {Array.from({ length: rows }, (_, r) =>
            Array.from({ length: cols }, (_, c) => {
              const idx = c * rows + r;
              if (idx >= 99) return <div key={`${r}-${c}`} />;
              const stagger = r % 2 === 0;
              return (
                <div key={`${r}-${c}`} style={{
                  display: "flex",
                  alignItems: "center",
                  justifyContent: stagger ? "flex-start" : "flex-end",
                  fontSize: "min(3.8vh, 2.5vw)",
                  fontWeight: 700,
                  fontFamily: "'Hiragino Sans', 'Yu Gothic', sans-serif",
                  color: "#222",
                  paddingLeft: stagger ? "15%" : 0,
                  paddingRight: stagger ? 0 : "15%",
                }}>
                  {grid[idx]}
                </div>
              );
            })
          )}
        </div>
      </div>
    </div>
  );
}

function ImageScreen({ back, images, title }) {
  const chosen = useMemo(() => randomItem(images), [images]);
  const isBase64 = chosen.startsWith("data:");
  return (
    <div style={styles.page}>
      {back}
      <div style={{
        display: "flex", alignItems: "center", justifyContent: "center",
        height: "calc(100vh - 48px)", padding: "0 16px 16px",
      }}>
        {isBase64 ? (
          <img src={chosen} alt={title} style={{
            maxWidth: "100%", maxHeight: "100%", objectFit: "contain",
          }} />
        ) : (
          <div style={{
            width: "100%", height: "100%",
            border: "2px dashed #DDD", borderRadius: 12,
            display: "flex", flexDirection: "column",
            alignItems: "center", justifyContent: "center",
            background: "#FAFAFA",
          }}>
            <p style={{ color: "#999", fontSize: 16, margin: 0 }}>画像プレースホルダー</p>
            <p style={{ color: "#666", fontSize: 22, margin: "12px 0 0", fontWeight: 600 }}>{chosen}</p>
            <p style={{ color: "#aaa", fontSize: 13, margin: "16px 0 0" }}>
              実際の運用時はここに画像が表示されます
            </p>
          </div>
        )}
      </div>
    </div>
  );
}

function KanjiScreen({ back }) {
  const sections = useMemo(() => {
    return [0, 1, 2].map(() =>
      Array.from({ length: 40 }, () => randomItem(KANJI_PATTERNS))
    );
  }, []);

  return (
    <div style={styles.page}>
      {back}
      <div style={{ padding: "8px 12px" }}>
        {sections.map((cols, si) => (
          <div key={si} style={{ marginBottom: si < 2 ? 16 : 0 }}>
            <div style={{
              fontSize: 12, color: "#999", marginBottom: 4, fontWeight: 500
            }}>段{si + 1}</div>
            <div style={{
              display: "grid",
              gridTemplateColumns: `repeat(40, 1fr)`,
              gap: 0,

// ╔══════════════════════════════════════════════╗
// ║  ⑤ イメージ記憶                               ║
// ╚══════════════════════════════════════════════╝

function ImageMemoryScreen({ back }) {
  const pairs = useMemo(() => {
    const selected = pickRandom(WORDS, 80);
    const result = [];
    for (let i = 0; i < selected.length; i += 2) {
      result.push([selected[i], selected[i + 1]]);
    }
    return result;
  }, []);

  // 各ペアで隠す側をランダムに決定（0=左を隠す, 1=右を隠す）
  const hideSides = useMemo(() =>
    Array.from({ length: 40 }, () => Math.random() < 0.5 ? 0 : 1)
  , []);

  const [phase, setPhase] = useState("memorize");
  const [inputs, setInputs] = useState(() => Array(40).fill(""));

  const handleInput = (index, value) => {
    setInputs(prev => { const n = [...prev]; n[index] = value; return n; });
  };

  const correctCount = pairs.reduce((sum, pair, i) =>
    sum + (inputs[i].trim() === pair[hideSides[i]] ? 1 : 0), 0
  );

  const renderWord = (pair, i, side) => {
    const isHidden = hideSides[i] === side;
    const answer = pair[hideSides[i]];
    const userAnswer = inputs[i].trim();
    const isCorrect = userAnswer === answer;

    if (phase === "memorize") {
      return <span style={{ fontWeight: 500, minWidth: 60 }}>{pair[side]}</span>;
    }
    if (phase === "test") {
      if (isHidden) {
        return (
          <input
            type="text"
            value={inputs[i]}
            onChange={e => handleInput(i, e.target.value)}
            style={{
              border: "none", borderBottom: "1px solid #CCC",
              outline: "none", fontSize: 15, fontWeight: 500,
              width: 100, padding: "2px 4px", background: "transparent",
              fontFamily: "'Hiragino Sans', 'Yu Gothic', sans-serif",
            }}
          />
        );
      }
      return <span style={{ fontWeight: 500, minWidth: 60 }}>{pair[side]}</span>;
    }
    if (isHidden) {
      return (
        <React.Fragment>
          <span style={{ fontWeight: 500, color: "#222", minWidth: 50 }}>
            {userAnswer || ""}
          </span>
          {!isCorrect && (
            <span style={{ marginLeft: 8, color: "#43A047", fontWeight: 500 }}>
              → {answer}
            </span>
          )}
          <span style={{ marginLeft: 8, fontSize: 16, flexShrink: 0 }}>
            {isCorrect ? "✔️" : "✖️"}
          </span>
        </React.Fragment>
      );
    }
    return <span style={{ fontWeight: 500, minWidth: 60 }}>{pair[side]}</span>;
  };

  return (
    <div style={styles.page}>
      <div style={{
        display: "flex", justifyContent: "space-between", alignItems: "center",
        padding: "0 16px", position: "sticky", top: 0, background: "#fff",
        zIndex: 10, borderBottom: "1px solid #E0E0E0",
      }}>
        {back}
        {phase === "memorize" && (
          <button onClick={() => setPhase("test")} style={styles.finishBtn}>
            テスト開始
          </button>
        )}
        {phase === "test" && (
          <button onClick={() => setPhase("result")} style={styles.finishBtn}>
            答え合わせ
          </button>
        )}
        {phase === "result" && (
          <div style={{
            background: "#222", color: "#fff", padding: "8px 20px",
            borderRadius: 8, fontSize: 16, fontWeight: 600,
          }}>
            結果：{correctCount} / 40 正解
          </div>
        )}
      </div>
      <div style={{
        display: "grid",
        gridTemplateColumns: "1fr 1fr",
        gap: "4px 48px",
        padding: "12px 48px",
        maxWidth: 900,
        margin: "0 auto",
      }}>
        {pairs.map((pair, i) => (
          <div key={i} style={{
            display: "flex",
            alignItems: "center",
            padding: "6px 0",
            borderBottom: "1px solid #F0F0F0",
            fontSize: 15,
            color: "#222",
            fontFamily: "'Hiragino Sans', 'Yu Gothic', sans-serif",
          }}>
            <span style={{ color: "#999", width: 32, fontSize: 13, flexShrink: 0 }}>{i + 1}.</span>
            {renderWord(pair, i, 0)}
            <span style={{ margin: "0 12px", color: "#CCC" }}>―</span>
            {renderWord(pair, i, 1)}
          </div>
        ))}
      </div>
    </div>
  );
}

// ╔══════════════════════════════════════════════╗
// ║  ⑥ 論理                                     ║
// ╚══════════════════════════════════════════════╝

function LogicScreen({ back }) {
  const questions = useMemo(() => pickRandom(LOGIC_QUESTIONS, 60), []);
  const [answers, setAnswers] = useState({});
  const [finished, setFinished] = useState(false);

  const handleAnswer = (qi, ci) => {
    if (finished) return;
    setAnswers(prev => ({ ...prev, [qi]: ci }));
  };

  const handleFinish = () => setFinished(true);

  const correctCount = questions.reduce((sum, q, i) =>
    sum + (answers[i] === q.answer ? 1 : 0), 0
  );
  const answeredCount = Object.keys(answers).length;

  return (
    <div style={styles.page}>
      <div style={{
        display: "flex", justifyContent: "space-between", alignItems: "center",
        padding: "0 16px", position: "sticky", top: 0, background: "#fff",
        zIndex: 10, borderBottom: "1px solid #E0E0E0",
      }}>
        {back}
        {!finished ? (
          <button onClick={handleFinish} style={styles.finishBtn}>
            終わる
          </button>
        ) : (
          <div style={{
            background: "#222", color: "#fff", padding: "8px 20px",
            borderRadius: 8, fontSize: 16, fontWeight: 600,
          }}>
            結果：{correctCount} / {answeredCount} 正解
          </div>
        )}
      </div>

      <div style={{ padding: "12px 16px" }}>
        {questions.map((q, qi) => {
          const userAnswer = answers[qi];
          const isAnswered = userAnswer !== undefined;
          const isCorrect = userAnswer === q.answer;

          return (
            <div key={qi} style={{
              display: "flex",
              alignItems: "center",
              padding: "10px 0",
              borderBottom: "1px solid #F0F0F0",
              gap: 12,
            }}>
              <span style={{
                color: "#999", fontSize: 13, width: 36, flexShrink: 0, textAlign: "right"
              }}>
                Q{qi + 1}.
              </span>
              <span style={{
                flex: 1, fontSize: 14, color: "#222", lineHeight: 1.5,
                fontFamily: "'Hiragino Sans', 'Yu Gothic', sans-serif",
              }}>
                {q.question}
              </span>
              <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
                {q.choices.map((c, ci) => {
                  let bg = "#F5F5F5";
                  let border = "1px solid #DDD";
                  let color = "#222";
                  if (isAnswered && userAnswer === ci) {
                    if (finished) {
                      bg = isCorrect ? "#E8F5E9" : "#FFEBEE";
                      border = isCorrect ? "1px solid #A5D6A7" : "1px solid #EF9A9A";
                    } else {
                      bg = "#DDD";
                    }
                  }
                  if (finished && ci === q.answer && userAnswer !== ci) {
                    border = "2px solid #66BB6A";
                  }
                  return (
                    <button key={ci} onClick={() => handleAnswer(qi, ci)} style={{
                      padding: "6px 14px", borderRadius: 6, fontSize: 13,
                      background: bg, border, color, cursor: finished ? "default" : "pointer",
                      fontFamily: "'Hiragino Sans', 'Yu Gothic', sans-serif",
                      fontWeight: 500, transition: "background 0.15s",
                      minWidth: 44,
                    }}>
                      {c}
                    </button>
                  );
                })}
              </div>
              {finished && isAnswered && (
                <span style={{ fontSize: 16, width: 24, textAlign: "center", flexShrink: 0 }}>
                  {isCorrect ? "✔️" : "✖️"}
                </span>
              )}
              {finished && !isAnswered && (
                <span style={{ fontSize: 11, color: "#999", width: 44, flexShrink: 0 }}>未回答</span>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}
